events {
    worker_connections 1024;
}

http {
    # Include basic configurations
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=health:10m rate=5r/s;

    # Upstream services with fallbacks
    upstream auth_service {
        server auth-service:8000;
        server 127.0.0.1:8000 backup;
    }

    upstream event_capture_service {
        server event-service:8002;
        server 127.0.0.1:8000 backup;
    }

    upstream telemetry_processor_service {
        server event-service:8002;
        server 127.0.0.1:8000 backup;
    }

    upstream academic_risk_service {
        server event-service:8002;
        server 127.0.0.1:8000 backup;
    }

    upstream alert_service {
        server event-service:8002;
        server 127.0.0.1:8000 backup;
    }

    # Main server block
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # Health aggregation endpoint
        location /health-aggregate {
            limit_req zone=health burst=10 nodelay;
            proxy_pass http://telemetry_processor_service/health-aggregate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth service routes
        location /auth/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Event capture service routes
        location /event-capture/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://event_capture_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Telemetry processor service routes
        location /telemetry-processor/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://telemetry_processor_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Academic risk service routes
        location /academic-risk/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://academic_risk_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Alert service routes
        location /alert/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://alert_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API documentation routes
        location /docs {
            proxy_pass http://auth_service/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/docs {
            proxy_pass http://auth_service/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /event-capture/docs {
            proxy_pass http://event_capture_service/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /telemetry-processor/docs {
            proxy_pass http://telemetry_processor_service/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /academic-risk/docs {
            proxy_pass http://academic_risk_service/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /alert/docs {
            proxy_pass http://alert_service/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root endpoint
        location / {
            return 200 '{"message": "Learning Analytics Platform API Gateway", "version": "1.0.0"}';
            add_header Content-Type application/json;
        }

        # Default error handling
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html {
            internal;
            root /usr/share/nginx/html;
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }

        location = /50x.html {
            internal;
            root /usr/share/nginx/html;
            return 503 '{"error": "Service Unavailable"}';
            add_header Content-Type application/json;
        }
    }
}

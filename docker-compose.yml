version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: learning-analytics-postgres
    environment:
      POSTGRES_DB: learning_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning-analytics-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: learning-analytics-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning-analytics-network

  # Gateway — build context is this directory (learning-analytics-platform/)
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: learning-analytics-gateway
    ports:
      - "8080:80"
    environment:
      PORT: 80
      AUTH_SERVICE_URL: auth-service:8000
      EVENT_SERVICE_URL: event-service:8002
      TELEMETRY_SERVICE_URL: telemetry-processor-service:8003
      RISK_SERVICE_URL: academic-risk-service:8004
      ALERT_SERVICE_URL: alert-service:8005
    depends_on:
      - auth-service
      - event-service
      - telemetry-processor-service
      - academic-risk-service
      - alert-service
    networks:
      - learning-analytics-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: learning-analytics-auth-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_service_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: learning-analytics-event-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: event_service_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  # Service name must match nginx upstream: telemetry-processor-service
  telemetry-processor-service:
    build:
      context: .
      dockerfile: telemetry-processor-service/Dockerfile
    container_name: learning-analytics-telemetry-processor-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: telemetry_processor_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  # Service name must match nginx upstream: academic-risk-service
  academic-risk-service:
    build:
      context: .
      dockerfile: academic-risk-service/Dockerfile
    container_name: learning-analytics-academic-risk-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: academic_risk_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  # Service name must match nginx upstream: alert-service
  alert-service:
    build:
      context: .
      dockerfile: alert-service/Dockerfile
    container_name: learning-analytics-alert-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: alert_service_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      PORT: 8005
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  learning-analytics-network:
    driver: bridge

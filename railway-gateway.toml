# Learning Analytics Platform - Railway Configuration
# API Gateway Service

[build]
command = "npm install"

[deploy]
startCommand = "npm run start:gateway"

[env]
# Database Configuration
DB_HOST = "${{railway.services.postgres.host}}"
DB_PORT = "${{railway.services.postgres.port}}"
DB_USER = "${{railway.services.postgres.user}}"
DB_PASSWORD = "${{railway.services.postgres.password}}"
DB_NAME = "learning_analytics"

# RabbitMQ Configuration
RABBITMQ_HOST = "${{railway.services.rabbitmq.host}}"
RABBITMQ_PORT = "${{railway.services.rabbitmq.port}}"
RABBITMQ_USER = "${{railway.services.rabbitmq.user}}"
RABBITMQ_PASSWORD = "${{railway.services.rabbitmq.password}}"

# JWT Configuration
JWT_SECRET = "your-super-secret-jwt-key-change-in-production"
JWT_ALGORITHM = "HS256"
JWT_EXPIRE_MINUTES = "60"

# CORS Configuration
CORS_ORIGINS = "https://learning-analitycs-frontend.vercel.app,http://localhost:3000"

# Service URLs - These will be set when other services are deployed
AUTH_SERVICE_URL = "${{railway.services.auth-service.url}}"
EVENT_SERVICE_URL = "${{railway.services.event-service.url}}"
TELEMETRY_SERVICE_URL = "${{railway.services.telemetry-service.url}}"
RISK_SERVICE_URL = "${{railway.services.risk-service.url}}"
ALERT_SERVICE_URL = "${{railway.services.alert-service.url}}"

# Gateway Port
PORT = "8080"

[http]
port = 8080
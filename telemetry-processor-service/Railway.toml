# Enrollment Service - Railway Configuration

[build]
command = "npm install"

[deploy]
startCommand = "npm run start:enrollments"

[env]
# Database Configuration
DB_HOST = "${{railway.services.postgres.host}}"
DB_PORT = "${{railway.services.postgres.port}}"
DB_USER = "${{railway.services.postgres.user}}"
DB_PASSWORD = "${{railway.services.postgres.password}}"
DB_NAME = "enrollment_service_db"

# RabbitMQ Configuration
RABBITMQ_HOST = "${{railway.services.rabbitmq.host}}"
RABBITMQ_PORT = "${{railway.services.rabbitmq.port}}"
RABBITMQ_USER = "${{railway.services.rabbitmq.user}}"
RABBITMQ_PASSWORD = "${{railway.services.rabbitmq.password}}"

# JWT Configuration
JWT_SECRET = "your-super-secret-jwt-key-change-in-production"
JWT_ALGORITHM = "HS256"
JWT_EXPIRE_MINUTES = "60"

# CORS Configuration
CORS_ORIGINS = "https://your-frontend.vercel.app,http://localhost:3000"

# Service Port
PORT = "8003"

[http]
port = 8003
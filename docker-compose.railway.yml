version: '3.8'

services:
  # Railway provides managed PostgreSQL and RabbitMQ
  # We'll use Railway's service discovery
  
  # Gateway — build context is this directory (learning-analytics-platform/)
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: learning-analytics-gateway
    ports:
      - "8080:80"
    environment:
      PORT: 80
      AUTH_SERVICE_URL: auth-service:8000
      EVENT_SERVICE_URL: event-service:8002
      TELEMETRY_SERVICE_URL: telemetry-processor-service:8003
      RISK_SERVICE_URL: academic-risk-service:8004
      ALERT_SERVICE_URL: alert-service:8005
      # Database connection for gateway monitoring
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: learning_analytics
    depends_on:
      - auth-service
      - event-service
      - telemetry-processor-service
      - academic-risk-service
      - alert-service
    networks:
      - learning-analytics-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: learning-analytics-auth-service
    environment:
      # Railway service discovery
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_service_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      Railway service discovery
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: learning-analytics-event-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: event_service_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      Railway service discovery
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  telemetry-processor-service:
    build:
      context: .
      dockerfile: telemetry-processor-service/Dockerfile
    container_name: learning-analytics-telemetry-processor-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: telemetry_processor_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      Railway service discovery
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  academic-risk-service:
    build:
      context: .
      dockerfile: academic-risk-service/Dockerfile
    container_name: learning-analytics-academic-risk-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: academic_risk_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      Railway service discovery
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

  alert-service:
    build:
      context: .
      dockerfile: alert-service/Dockerfile
    container_name: learning-analytics-alert-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: alert_service_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      PORT: 8005
      CORS_ORIGINS: ${CORS_ORIGINS}
      Railway service discovery
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - learning-analytics-network
    restart: unless-stopped

volumes:
  # Railway provides managed volumes, so we don't need to define them here
  # Data will be persisted by Railway's managed services

networks:
  learning-analytics-network:
    driver: bridge